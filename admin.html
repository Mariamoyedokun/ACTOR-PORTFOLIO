<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Oyewale Oyedokun Lookman</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg-color: #051F20;
      --surface: rgba(255, 255, 255, 0.05);
      --surface-strong: rgba(255, 255, 255, 0.08);
      --border-light: rgba(218, 241, 222, 0.12);
      --text-dark: #DAF1DE;
      --text-secondary: #8EB69B;
      --accent-gold: #775a19;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 620px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.25);
    }

    h2 {
      color: var(--text-dark);
    }

    .form-control,
    .form-control:focus,
    .form-select,
    .form-select:focus {
      background-color: var(--surface);
      border: 1px solid rgba(218, 241, 222, 0.2);
      color: #ffffff;
      border-radius: 0;
      box-shadow: none;
    }

    .form-control::placeholder,
    .form-select::placeholder {
      color: rgba(255, 255, 255, 0.65);
      opacity: 1;
    }

    .form-label,
    .text-muted {
      color: var(--text-secondary) !important;
    }

    .btn {
      border-radius: 0;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .btn-dark {
      background-color: var(--accent-gold);
      border-color: var(--accent-gold);
      color: #fcf9f6;
    }

    .btn-dark:hover {
      background-color: transparent;
      color: var(--accent-gold);
      border-color: var(--accent-gold);
    }

    .btn-primary {
      background-color: rgba(142, 182, 155, 0.18);
      border-color: rgba(142, 182, 155, 0.35);
      color: var(--text-dark);
    }

    .btn-outline-secondary {
      color: var(--text-secondary);
      border-color: rgba(218, 241, 222, 0.2);
    }

    .btn-outline-secondary:hover {
      background-color: var(--accent-gold);
      color: #fcf9f6;
      border-color: var(--accent-gold);
    }

    .alert {
      background-color: rgba(255, 255, 255, 0.06);
      border-color: rgba(218, 241, 222, 0.16);
      color: var(--text-dark);
    }

    #togglePasswordIcon {
      color: var(--text-secondary);
    }

    .modal-content {
      background-color: var(--bg-color);
      border: 1px solid rgba(218, 241, 222, 0.14);
      color: var(--text-dark);
    }

    .modal-header .modal-title,
    .modal-body label,
    .modal-body input,
    .modal-body textarea {
      color: var(--text-dark);
    }
  </style>
</head>
<body class="p-4">
  <div class="container" style="max-width: 600px;">
    <h2 class="mb-4">Reel Manager</h2>

    <div id="adminLogin" class="mb-3">
      <input type="email" class="form-control mb-2" id="adminEmail" placeholder="Admin email">
      <div class="position-relative mb-2">
        <input type="password" class="form-control" id="adminPassword" placeholder="Password">
        <i class="bi bi-eye" id="togglePasswordIcon" onclick="togglePasswordVisibility()"
           style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#6c757d;"></i>
      </div>
      <div id="loginError" class="alert alert-danger py-2" style="display:none; font-size: 0.9rem;"></div>
      <button class="btn btn-dark" onclick="adminLogin()">Log in</button>
    </div>

    <div id="adminControls" class="mb-4" style="display:none;">
      <input type="file" id="reelFile" accept="video/*" style="display:none;" onchange="handleFileSelect()">
      <button class="btn btn-primary" onclick="document.getElementById('reelFile').click()">+ Add Reel</button>
      <button class="btn btn-outline-secondary ms-2" onclick="adminLogout()">Log out</button>
      <div id="uploadStatus" class="mt-2"></div>
    </div>

    <!-- Caption / Details Modal -->
    <div class="modal fade" id="captionModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Add reel details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <video id="previewVideo" controls class="w-100 mb-3"></video>
            <div class="mb-2">
              <label class="form-label small text-muted">Category (e.g. Feature Film / Drama)</label>
              <input type="text" class="form-control" id="reelCategory" placeholder="Category">
            </div>
            <div class="mb-2">
              <label class="form-label small text-muted">Title</label>
              <input type="text" class="form-control" id="reelTitle" placeholder="Movie or series title">
            </div>
            <div class="mb-2">
              <label class="form-label small text-muted">Description</label>
              <textarea class="form-control" id="reelDescription" rows="3" placeholder="Short description"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary" onclick="uploadReel()">Upload</button>
          </div>
        </div>
      </div>
    </div>

    <div id="mediaGrid" class="row g-3"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAPkUhkBu4vAaQSvg3zKSEzT2oie8WEivY",
    authDomain: "actor-portfolio.firebaseapp.com",
    projectId: "actor-portfolio",
    storageBucket: "actor-portfolio.firebasestorage.app",
    messagingSenderId: "958206353188",
    appId: "1:958206353188:web:8f69589e732044cbb89db1"
  };

  const CLOUD_NAME = "r639gv0o";
  const UPLOAD_PRESET = "actor_reels";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const reelsRef = collection(db, "reels");

  let selectedFile = null;
  let captionModal;

  // Show admin UI if any user is successfully logged in
  onAuthStateChanged(auth, (user) => {
    const isLoggedIn = !!user;
    document.getElementById('adminLogin').style.display = isLoggedIn ? 'none' : 'block';
    document.getElementById('adminControls').style.display = isLoggedIn ? 'block' : 'none';
    if (isLoggedIn) renderReels();
  });

  window.adminLogin = async function () {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errorBox = document.getElementById('loginError');
    errorBox.style.display = 'none';

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      let message = "Something went wrong. Please try again.";
      if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
        message = "Email or password is incorrect.";
      } else if (err.code === 'auth/too-many-requests') {
        message = "Too many attempts. Please wait a moment.";
      }
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }
  };

  window.adminLogout = function () {
    signOut(auth);
    document.getElementById('mediaGrid').innerHTML = '';
  };

  window.togglePasswordVisibility = function () {
    const input = document.getElementById('adminPassword');
    const icon = document.getElementById('togglePasswordIcon');
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    icon.classList.toggle('bi-eye', !isPassword);
    icon.classList.toggle('bi-eye-slash', isPassword);
  };

  window.handleFileSelect = function () {
    const file = document.getElementById('reelFile').files[0];
    if (!file) return;
    selectedFile = file;

    document.getElementById('previewVideo').src = URL.createObjectURL(file);
    if (!captionModal) captionModal = new bootstrap.Modal(document.getElementById('captionModal'));
    captionModal.show();
  };

  window.uploadReel = function () {
    if (!selectedFile) return;

    const category = document.getElementById('reelCategory').value.trim();
    const title = document.getElementById('reelTitle').value.trim();
    const description = document.getElementById('reelDescription').value.trim();
    const status = document.getElementById('uploadStatus');
    captionModal.hide();

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('upload_preset', UPLOAD_PRESET);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);

    xhr.upload.addEventListener('progress', (e) => {
      if (e.lengthComputable) {
        const percent = Math.round((e.loaded / e.total) * 100);
        status.innerHTML = `<div class="alert alert-info py-2">Uploading... ${percent}%</div>`;
      }
    });

    xhr.onload = async () => {
      try {
        const data = JSON.parse(xhr.responseText);
        if (!data.secure_url) throw new Error('Upload failed');

        await addDoc(reelsRef, {
          url: data.secure_url,
          category,
          title,
          description,
          createdAt: Date.now()
        });

        status.innerHTML = '<div class="alert alert-success py-2">Reel added!</div>';
        document.getElementById('reelCategory').value = '';
        document.getElementById('reelTitle').value = '';
        document.getElementById('reelDescription').value = '';
        document.getElementById('reelFile').value = '';
        selectedFile = null;
        renderReels();
      } catch (err) {
        status.innerHTML = `<div class="alert alert-danger py-2">Upload failed: ${err.message}</div>`;
      }
    };

    xhr.onerror = () => {
      status.innerHTML = '<div class="alert alert-danger py-2">Upload failed — check your connection.</div>';
    };

    xhr.send(formData);
  };

  window.deleteReel = async function (id) {
    try {
      await deleteDoc(doc(db, "reels", id));
      renderReels();
    } catch (err) {
      alert("Permission denied: You do not have access to delete this reel.");
    }
  };

  async function renderReels() {
    const grid = document.getElementById('mediaGrid');
    grid.innerHTML = '';

    const q = query(reelsRef, orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);

    snapshot.forEach(docSnap => {
      const reel = docSnap.data();
      const col = document.createElement('div');
      col.className = 'col-md-6';
      col.innerHTML = `
        <div class="card h-100">
          <video src="${reel.url}" controls class="card-img-top"></video>
          <div class="card-body d-flex flex-column">
            ${reel.category ? `<p class="text-muted small mb-1">${escapeHtml(reel.category)}</p>` : ''}
            ${reel.title ? `<h5>${escapeHtml(reel.title)}</h5>` : ''}
            ${reel.description ? `<p class="card-text">${escapeHtml(reel.description)}</p>` : ''}
            <button class="btn btn-sm btn-outline-danger mt-auto align-self-start" onclick="deleteReel('${docSnap.id}')">Delete</button>
          </div>
        </div>
      `;
      grid.appendChild(col);
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>'"]/g, 
      tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
  }
</script>
</body>
</html>
