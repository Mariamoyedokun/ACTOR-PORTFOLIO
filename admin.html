<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Oyewale Oyedokun Lookman</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg-color: #051F20;
      --surface: rgba(255, 255, 255, 0.05);
      --surface-strong: rgba(255, 255, 255, 0.08);
      --border-light: rgba(218, 241, 222, 0.12);
      --text-dark: #DAF1DE;
      --text-secondary: #8EB69B;
      --accent-gold: #775a19;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: block;
      padding: 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.25);
    }

    .admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .admin-actions .btn {
      flex: 1 1 160px;
    }

    .admin-section {
      margin-top: 2.5rem;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(218, 241, 222, 0.12);
      border-radius: 1rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .section-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      margin: 0;
      color: #fcf9f6;
    }

    .section-header .section-subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .card {
      background-color: rgba(255, 255, 255, 0.04);
      border-color: rgba(218, 241, 222, 0.15);
      color: var(--text-dark);
    }

    .card-body h5 {
      color: #fcf9f6;
    }

    .btn-outline-danger {
      border-color: rgba(255, 255, 255, 0.18);
      color: #f8d7da;
    }

    .btn-outline-danger:hover {
      background-color: rgba(255, 255, 255, 0.08);
      color: #fcf9f6;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1.25rem;
      }

      .admin-actions {
        flex-direction: column;
      }

      .admin-actions .btn {
        width: 100%;
      }
    }

    @media (max-width: 576px) {
      .section-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    h2 {
      color: var(--text-dark);
    }

    .form-control,
    .form-control:focus,
    .form-select,
    .form-select:focus {
      background-color: var(--surface);
      border: 1px solid rgba(218, 241, 222, 0.2);
      color: #ffffff;
      border-radius: 0;
      box-shadow: none;
    }

    .form-control::placeholder,
    .form-select::placeholder {
      color: rgba(255, 255, 255, 0.65);
      opacity: 1;
    }

    .form-label,
    .text-muted {
      color: var(--text-secondary) !important;
    }

    .btn {
      border-radius: 0;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .btn-dark {
      background-color: var(--accent-gold);
      border-color: var(--accent-gold);
      color: #fcf9f6;
    }

    .btn-dark:hover {
      background-color: transparent;
      color: var(--accent-gold);
      border-color: var(--accent-gold);
    }

    .btn-primary {
      background-color: rgba(142, 182, 155, 0.18);
      border-color: rgba(142, 182, 155, 0.35);
      color: var(--text-dark);
    }

    .btn-outline-secondary {
      color: var(--text-secondary);
      border-color: rgba(218, 241, 222, 0.2);
    }

    .btn-outline-secondary:hover {
      background-color: var(--accent-gold);
      color: #fcf9f6;
      border-color: var(--accent-gold);
    }

    .alert {
      background-color: rgba(255, 255, 255, 0.06);
      border-color: rgba(218, 241, 222, 0.16);
      color: var(--text-dark);
    }

    #togglePasswordIcon {
      color: var(--text-secondary);
    }

    .modal-content {
      background-color: var(--bg-color);
      border: 1px solid rgba(218, 241, 222, 0.14);
      color: var(--text-dark);
    }

    .modal-header .modal-title,
    .modal-body label,
    .modal-body input,
    .modal-body textarea {
      color: var(--text-dark);
    }
  </style>
</head>
<body class="p-4">
  <div class="container" style="max-width: 600px;">
    <h2 class="mb-4">Admin Panel</h2>

    <div id="adminLogin" class="mb-3">
      <input type="email" class="form-control mb-2" id="adminEmail" placeholder="Admin email">
      <div class="position-relative mb-2">
        <input type="password" class="form-control" id="adminPassword" placeholder="Password">
        <i class="bi bi-eye" id="togglePasswordIcon" onclick="togglePasswordVisibility()"
           style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#6c757d;"></i>
      </div>
      <div id="loginError" class="alert alert-danger py-2" style="display:none; font-size: 0.9rem;"></div>
      <button class="btn btn-dark" onclick="adminLogin()">Log in</button>
    </div>

    <div id="adminControls" class="mb-4" style="display:none;">
      <input type="file" id="reelFile" accept="video/*" style="display:none;" onchange="handleFileSelect()">
      <div class="admin-actions">
        <button class="btn btn-primary" onclick="openReelPicker()">+ Add Reel</button>
        <button class="btn btn-dark" onclick="openStoryModal()">+ Write Story</button>
        <button class="btn btn-outline-secondary" onclick="adminLogout()">Log out</button>
      </div>
      <div id="uploadStatus" class="mt-2"></div>
    </div>

    <!-- Caption / Details Modal -->
    <div class="modal fade" id="captionModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Add reel details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <video id="previewVideo" controls class="w-100 mb-3"></video>
            <div class="mb-2">
              <label class="form-label small text-muted">Category (e.g. Feature Film / Drama)</label>
              <input type="text" class="form-control" id="reelCategory" placeholder="Category">
            </div>
            <div class="mb-2">
              <label class="form-label small text-muted">Title</label>
              <input type="text" class="form-control" id="reelTitle" placeholder="Movie or series title">
            </div>
            <div class="mb-2">
              <label class="form-label small text-muted">Description</label>
              <textarea class="form-control" id="reelDescription" rows="3" placeholder="Short description"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary" onclick="uploadReel()">Upload</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Story Modal -->
    <div class="modal fade" id="storyModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Write story</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-2">
              <label class="form-label small text-muted">Title</label>
              <input type="text" class="form-control" id="postTitle" placeholder="Story title">
            </div>
            <div class="mb-2">
              <label class="form-label small text-muted">Category</label>
              <input type="text" class="form-control" id="postCategory" placeholder="Behind the Scenes, Career Update">
            </div>
            <div class="mb-2">
              <label class="form-label small text-muted">Content</label>
              <textarea class="form-control" id="postContent" rows="5" placeholder="Write the full story here"></textarea>
            </div>
            <div class="mb-2">
              <label class="form-label small text-muted">Cover image (optional)</label>
              <input type="file" class="form-control" id="postCoverImage" accept="image/*">
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary" onclick="uploadStory()">Publish</button>
          </div>
        </div>
      </div>
    </div>

    <div id="reelsSection" class="admin-section" style="display:none;">
      <div class="section-header">
        <h3>Reels</h3>
        <span class="section-subtitle">Manage reel uploads</span>
      </div>
      <div id="mediaGrid" class="row g-3"></div>
    </div>

    <div id="storiesSection" class="admin-section" style="display:none;">
      <div class="section-header">
        <h3>Stories</h3>
        <span class="section-subtitle">Manage blog posts</span>
      </div>
      <div id="postList" class="row g-3"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAPkUhkBu4vAaQSvg3zKSEzT2oie8WEivY",
    authDomain: "actor-portfolio.firebaseapp.com",
    projectId: "actor-portfolio",
    storageBucket: "actor-portfolio.firebasestorage.app",
    messagingSenderId: "958206353188",
    appId: "1:958206353188:web:8f69589e732044cbb89db1"
  };

  const CLOUD_NAME = "r639gv0o";
  const UPLOAD_PRESET = "actor_reels";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const reelsRef = collection(db, "reels");
  const postsRef = collection(db, "posts");

  const ADMIN_EMAIL = "oyewaleoyedokun981@gmail.com";

  let selectedFile = null;
  let captionModal;
  let storyModal;

  // Only show admin UI for the specific admin account, not any logged-in user
  onAuthStateChanged(auth, (user) => {
    const isAdmin = user && user.email === ADMIN_EMAIL;
    document.getElementById('adminLogin').style.display = isAdmin ? 'none' : 'block';
    document.getElementById('adminControls').style.display = isAdmin ? 'block' : 'none';
    document.getElementById('reelsSection').style.display = isAdmin ? 'block' : 'none';
    document.getElementById('storiesSection').style.display = isAdmin ? 'block' : 'none';

    if (isAdmin) {
      renderReels();
      renderPosts();
    } else {
      document.getElementById('mediaGrid').innerHTML = '';
      document.getElementById('postList').innerHTML = '';
    }
  });

  window.adminLogin = async function () {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errorBox = document.getElementById('loginError');
    errorBox.style.display = 'none';

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      let message = "Something went wrong. Please try again.";
      switch (err.code) {
        case 'auth/invalid-email':
          message = "That email address doesn't look right.";
          break;
        case 'auth/user-not-found':
        case 'auth/invalid-credential':
        case 'auth/wrong-password':
          message = "Email or password is incorrect.";
          break;
        case 'auth/too-many-requests':
          message = "Too many attempts. Please wait a moment and try again.";
          break;
        case 'auth/network-request-failed':
          message = "Network error — check your connection and try again.";
          break;
      }
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }
  };

  window.adminLogout = function () {
    signOut(auth);
    document.getElementById('mediaGrid').innerHTML = '';
    document.getElementById('postList').innerHTML = '';
  };

  window.togglePasswordVisibility = function () {
    const input = document.getElementById('adminPassword');
    const icon = document.getElementById('togglePasswordIcon');
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    icon.classList.toggle('bi-eye', !isPassword);
    icon.classList.toggle('bi-eye-slash', isPassword);
  };

  window.openReelPicker = function () {
    document.getElementById('reelCategory').value = '';
    document.getElementById('reelTitle').value = '';
    document.getElementById('reelDescription').value = '';
    document.getElementById('reelFile').click();
  };

  window.handleFileSelect = function () {
    const file = document.getElementById('reelFile').files[0];
    if (!file) return;
    selectedFile = file;

    document.getElementById('previewVideo').src = URL.createObjectURL(file);
    if (!captionModal) captionModal = new bootstrap.Modal(document.getElementById('captionModal'));
    captionModal.show();
  };

  window.uploadReel = function () {
    if (!selectedFile) return;

    const category = document.getElementById('reelCategory').value.trim();
    const title = document.getElementById('reelTitle').value.trim();
    const description = document.getElementById('reelDescription').value.trim();
    const status = document.getElementById('uploadStatus');
    captionModal.hide();

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('upload_preset', UPLOAD_PRESET);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);

    xhr.upload.addEventListener('progress', (e) => {
      if (e.lengthComputable) {
        const percent = Math.round((e.loaded / e.total) * 100);
        status.innerHTML = `<div class="alert alert-info py-2">Uploading... ${percent}%</div>`;
      }
    });

    xhr.onload = async () => {
      try {
        const data = JSON.parse(xhr.responseText);
        if (!data.secure_url) throw new Error('Upload failed');

        await addDoc(reelsRef, {
          url: data.secure_url,
          category,
          title,
          description,
          createdAt: serverTimestamp()
        });

        status.innerHTML = '<div class="alert alert-success py-2">Reel added!</div>';
        document.getElementById('reelCategory').value = '';
        document.getElementById('reelTitle').value = '';
        document.getElementById('reelDescription').value = '';
        document.getElementById('reelFile').value = '';
        selectedFile = null;
        renderReels();
      } catch (err) {
        status.innerHTML = `<div class="alert alert-danger py-2">Upload failed: ${err.message}</div>`;
      }
    };

    xhr.onerror = () => {
      status.innerHTML = '<div class="alert alert-danger py-2">Upload failed — check your connection.</div>';
    };

    xhr.send(formData);
  };

  window.deleteReel = async function (id) {
    try {
      await deleteDoc(doc(db, "reels", id));
      renderReels();
    } catch (err) {
      const message = err.code === 'permission-denied'
        ? 'Permission denied: verify Firestore rules for reels.'
        : 'Could not delete reel: ' + err.message;
      alert(message);
    }
  };

  window.openStoryModal = function () {
    if (!storyModal) storyModal = new bootstrap.Modal(document.getElementById('storyModal'));
    document.getElementById('postTitle').value = '';
    document.getElementById('postCategory').value = '';
    document.getElementById('postContent').value = '';
    document.getElementById('postCoverImage').value = '';
    storyModal.show();
  };

  window.uploadStory = function () {
    const title = document.getElementById('postTitle').value.trim();
    const category = document.getElementById('postCategory').value.trim();
    const content = document.getElementById('postContent').value.trim();
    const fileInput = document.getElementById('postCoverImage');
    const coverFile = fileInput.files[0];
    const status = document.getElementById('uploadStatus');

    if (!title || !content) {
      status.innerHTML = '<div class="alert alert-danger py-2">Title and content are required.</div>';
      return;
    }

    storyModal.hide();

    const saveStory = async (coverUrl) => {
      try {
        const payload = {
          title,
          category,
          content,
          createdAt: serverTimestamp()
        };
        if (coverUrl) payload.coverImage = coverUrl;

        await addDoc(postsRef, payload);
        status.innerHTML = '<div class="alert alert-success py-2">Story published!</div>';
        document.getElementById('postTitle').value = '';
        document.getElementById('postCategory').value = '';
        document.getElementById('postContent').value = '';
        document.getElementById('postCoverImage').value = '';
        renderPosts();
      } catch (err) {
        const message = err.code === 'permission-denied'
          ? 'Publish failed: Firestore rules prevent writing to posts.'
          : `Publish failed: ${err.message}`;
        status.innerHTML = `<div class="alert alert-danger py-2">${message}</div>`;
      }
    };

    if (!coverFile) {
      saveStory();
      return;
    }

    const formData = new FormData();
    formData.append('file', coverFile);
    formData.append('upload_preset', UPLOAD_PRESET);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`);

    xhr.upload.addEventListener('progress', (e) => {
      if (e.lengthComputable) {
        const percent = Math.round((e.loaded / e.total) * 100);
        status.innerHTML = `<div class="alert alert-info py-2">Uploading cover image... ${percent}%</div>`;
      }
    });

    xhr.onload = async () => {
      try {
        const data = JSON.parse(xhr.responseText);
        if (!data.secure_url) throw new Error('Image upload failed');
        saveStory(data.secure_url);
      } catch (err) {
        status.innerHTML = `<div class="alert alert-danger py-2">Upload failed: ${err.message}</div>`;
      }
    };

    xhr.onerror = () => {
      status.innerHTML = '<div class="alert alert-danger py-2">Upload failed — check your connection.</div>';
    };

    xhr.send(formData);
  };

  window.deletePost = async function (id) {
    try {
      await deleteDoc(doc(db, "posts", id));
      renderPosts();
    } catch (err) {
      alert("Permission denied: You do not have access to delete this story.");
    }
  };

  async function renderPosts() {
    const list = document.getElementById('postList');
    list.innerHTML = '';

    const q = query(postsRef, orderBy('createdAt', 'desc'));
    const snapshot = await getDocs(q);

    snapshot.forEach(docSnap => {
      const post = docSnap.data();
      const col = document.createElement('div');
      col.className = 'col-md-6';
      col.innerHTML = `
        <div class="card h-100">
          <div class="card-body d-flex flex-column">
            ${post.title ? `<h5>${escapeHtml(post.title)}</h5>` : ''}
            ${post.category ? `<p class="text-muted small mb-3">${escapeHtml(post.category)}</p>` : ''}
            <button class="btn btn-sm btn-outline-danger mt-auto align-self-start" onclick="deletePost('${docSnap.id}')">Delete</button>
          </div>
        </div>
      `;
      list.appendChild(col);
    });
  }

  async function renderReels() {
    const grid = document.getElementById('mediaGrid');
    grid.innerHTML = '';

    const q = query(reelsRef, orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);

    snapshot.forEach(docSnap => {
      const reel = docSnap.data();
      const col = document.createElement('div');
      col.className = 'col-md-6';
      col.innerHTML = `
        <div class="card h-100">
          <video src="${reel.url}" controls class="card-img-top"></video>
          <div class="card-body d-flex flex-column">
            ${reel.category ? `<p class="text-muted small mb-1">${escapeHtml(reel.category)}</p>` : ''}
            ${reel.title ? `<h5>${escapeHtml(reel.title)}</h5>` : ''}
            ${reel.description ? `<p class="card-text">${escapeHtml(reel.description)}</p>` : ''}
            <button class="btn btn-sm btn-outline-danger mt-auto align-self-start" onclick="deleteReel('${docSnap.id}')">Delete</button>
          </div>
        </div>
      `;
      grid.appendChild(col);
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>'"]/g, 
      tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
  }
</script>
</body>
</html>
